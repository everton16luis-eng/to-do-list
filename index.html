<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do-List</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="css/img/icons/to-do-list.png" type="image/x-icon">

</head>

<body>
    <header on>
        <img width="100" height="100" src="css/img/icons/logo.png" alt="">
        <div class="navMenu">
            <p>TO-DO-LIST</p>
            <nav>
                <a href="#">Nova Tarefa</a>
                <a href="#">Tarefas Concluidas</a>
                <a href="#">Tarefas Atrasadas</a>
            </nav>
        </div>

    </header>
    <div class="conteudo">
        <div class="addTasks">
            <fieldset class="fieldTasks">
                <legend>Adicionar Tarefas.</legend>
                <label for="tarefas"></label>
                <input type="text" id="tarefas" placeholder="Descreva a tarefa a ser executada">
                <div class="data-butons">
                    <label for="data">Prazo:</label>
                    <input id="data" type="datetime-local" max="9999-12-31T23:59">
                    <button onclick=addTask()>Cadastrar</button>
                    <button onclick="clearField('#tarefas')">Limpar</button>
                </div>
            </fieldset>
        </div>
        <div class="currentTasks">
            <fieldset id="container">
                <legend>Tarefas</legend>
            </fieldset>
        </div>
        <div class="esgotedTasks">
            <fieldset id="atrasadas">
                <legend>Tarefas atrasadas.</legend>
            </fieldset>
        </div>
        <div class="removedTasks">
            <fieldset id="removidas">
                <legend>Tarefas removidas.</legend>
            </fieldset>
        </div>
        <div class=" completedTasks">
            <fieldset id="concluidas">
                <legend>Tarefas concluidas.</legend>
            </fieldset>
        </div>
    </div>
    <footer>Pézinho</footer>
    <script src="js/script.js"></script>
</body>

</html>
