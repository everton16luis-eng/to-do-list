<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do-List</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="css/img/icons/to-do-list.png" type="image/x-icon">
    <script src="js/script.js"></script>
</head>

<body>
    <header>
        <img width="100" height="100" src="css/img/icons/logo.png" alt="">
        <div class="navMenu">
            <p>TO-DO-LIST</p>
            <nav>
                <a href="#">Nova Tarefa</a>
                <a href="#">Tarefas Concluidas</a>
                <a href="#">Tarefas Atrasadas</a>
            </nav>
        </div>

    </header>
    <div class="conteudo">
        <div class="addTasks">
            <fieldset class="fieldTasks">
                <legend>Adicionar Tarefas</legend>
                <label for="tarefas"></label>
                <input type="text" id="tarefas" placeholder="Descreva a tarefa a ser executada">
                <div class="data-butons">
                    <label for="data">Prazo:</label>
                    <input id="data" type="datetime-local">
                    <button onclick=addTask()>Cadastrar</button>
                    <button onclick="clearField('#tarefas')">Limpar</button>
                </div>
            </fieldset>
        </div>
        <div class="currentTasks" id="container">
            <fieldset>
                <legend>Tarefas</legend>
                <div class="Task">
                    <p>Faça carinho no nosso pet</p>
                    <P>Prazo 23/02/2026</P>
                </div>
            </fieldset>
        </div>
        <div class=" completedTasks">
            <p>Tasks Completas</p>
            <p>Leve nosso pet para passear</p>
            <P>concluida em 23/02/2026</P>
        </div>
        <div class="esgotedTasks">
            <p></p>
            <p>Faça carinho no nosso pet</p>
            <P>Prazo encerrou em: 23/02/2026</P>
        </div>
    </div>
    <footer>Pézinho</footer>

</body>

</html>
